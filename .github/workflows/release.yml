name: Release Script Launcher

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run your make script
        run: |
          # 1. Fyne CLI가 필요하다면 여기서 한 번만 설치
          go install fyne.io/fyne/v2/cmd/fyne@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 2. 이미 가지고 계신 make.sh 실행 (실행 권한 부여 후)
          chmod +x make.sh
          ./make.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 리눅스 ARM64 빌드 (검증된 스크립트 그대로 실행)
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm64  # <--- 핵심: ARM64 전용 서버를 빌립니다.
    steps:
      - uses: actions/checkout@v4
      - name: Run ARM64 Script
        run: |
          chmod +x make_linux_arm64.sh
          ./make_linux_arm64.sh  # 수정하지 않은 원본 스크립트 실행

      - name: Upload ARM64 Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*_arm64.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 리눅스 AMD64 빌드 (검증된 스크립트 그대로 실행)
  build-linux-amd64:
    runs-on: ubuntu-latest  # 기본 x86_64 서버
    steps:
      - uses: actions/checkout@v4
      - name: Run AMD64 Script
        run: |
          chmod +x make_linux_amd64.sh
          ./make_linux_amd64.sh  # 수정하지 않은 원본 스크립트 실행

      - name: Upload AMD64 Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*_amd64.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 맥 빌드
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Mac Script
        run: |
          chmod +x make_mac_arm64.sh
          ./make_mac_arm64.sh
          zip -r ScriptLauncher_mac_arm64.zip ScriptLauncher.app

      - name: Upload Mac Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "ScriptLauncher_mac_arm64.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
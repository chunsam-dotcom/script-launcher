name: Release Script Launcher (macOS)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build and Package
        run: |
          # 1. 경로 설정
          export PATH=$PATH:$(go env GOPATH)/bin
          go mod tidy
          
          # 2. 아이콘 다운로드
          curl -sL https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/terminal.svg -o app.png
          
          # 3. macOS 앱 패키징 및 압축
          fyne package -os darwin -icon app.png -id "com.genius3.scriptlauncher" -name "ScriptLauncher"
          zip -r ScriptLauncher_macOS.zip ScriptLauncher.app

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ScriptLauncher_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
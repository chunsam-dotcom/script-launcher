name: Release Script Launcher (macOS)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install and Build (Unified Step)
        run: |
          # 1. Fyne CLI 설치
          go install fyne.io/fyne/v2/cmd/fyne@latest
          
          # 2. 설치된 경로를 현재 세션 PATH에 즉시 반영
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 3. 빌드 및 패키징 (같은 환경 내에서 실행)
          go mod tidy
          curl -sL https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/terminal.svg -o app.png
          
          fyne package -os darwin -icon app.png -id "com.genius3.scriptlauncher" -name "ScriptLauncher"
          zip -r ScriptLauncher_macOS.zip ScriptLauncher.app

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ScriptLauncher_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. 리눅스 빌드 (ARM64 & AMD64)
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Linux Build Scripts
        run: |
          chmod +x make_linux_arm64.sh make_linux_amd64.sh
          # 각 스크립트 내부에서 apt 설치부터 .deb 생성까지 완결
          ./make_linux_arm64.sh
          ./make_linux_amd64.sh

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. 맥 빌드 (Apple Silicon)
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Mac Build Script
        run: |
          chmod +x make_mac_arm64.sh
          # 스크립트 실행 후 ScriptLauncher.app 폴더가 생성됨
          ./make_mac_arm64.sh
          
          # 생성된 .app 폴더를 GitHub Release 업로드용으로 압축
          # -r 옵션으로 하위 폴더까지 모두 포함
          zip -r ScriptLauncher_mac_arm64.zip ScriptLauncher.app

      - name: Upload Mac Assets
        uses: softprops/action-gh-release@v2
        with:
          files: "ScriptLauncher_mac_arm64.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
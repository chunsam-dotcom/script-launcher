name: Release Script Launcher (macOS)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          # 설치된 위치를 시스템 경로에 추가합니다.
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build and Package
        run: |
          go mod tidy
          curl -sL https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/terminal.svg -o app.png
          
          # 이제 fyne 명령어를 바로 사용할 수 있습니다.
          fyne package -os darwin -icon app.png -id "com.genius3.scriptlauncher" -name "ScriptLauncher"
          zip -r ScriptLauncher_macOS.zip ScriptLauncher.app

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ScriptLauncher_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}